<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings — YLSMS</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div id="sidebar-placeholder"></div>

<div class="app-main">
  <div id="navbar-placeholder"></div>
  <div id="demoModeBanner" class="demo-banner d-none">
    <i class="bi bi-info-circle me-1"></i>
    Running in demo mode with sample data. Connect your Google Apps Script URL in <code>assets/js/config.js</code> to use real data.
  </div>

  <main class="page-content">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="app-card card-pad">
          <div class="section-heading">
            <h2><i class="bi bi-gear-fill me-2 text-secondary"></i>Settings</h2>
          </div>

          <div id="settingsAlert"></div>

          <form id="settingsForm">
            <div class="mb-3">
              <label class="form-label" for="orgName">Organization Name</label>
              <input type="text" class="form-control" id="orgName" placeholder="Youth Lions Society">
            </div>
            <div class="mb-3">
              <label class="form-label" for="whatsappLink">WhatsApp Group Link</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-whatsapp"></i></span>
                <input type="url" class="form-control" id="whatsappLink" placeholder="https://chat.whatsapp.com/...">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="feeAmount">Membership Fee Amount (Rs.)</label>
              <div class="input-group">
                <span class="input-group-text">Rs.</span>
                <input type="number" min="0" class="form-control" id="feeAmount" placeholder="500">
              </div>
              <div class="form-text">Used to calculate expected and collected totals on the Fees page.</div>
            </div>
            <div class="mb-4">
              <label class="form-label" for="systemTheme">System Theme</label>
              <select class="form-select" id="systemTheme">
                <option value="default">Default — Maroon &amp; Gold</option>
                <option value="midnight">Midnight — Navy &amp; Teal</option>
                <option value="emerald">Emerald — Green &amp; Gold</option>
              </select>
              <div class="form-text">Changes the sidebar and accent colors across the whole dashboard.</div>
            </div>

            <button type="submit" class="btn btn-primary" id="btnSaveSettings">
              <i class="bi bi-save-fill me-1"></i>Save Settings
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/components.js"></script>
<script src="../assets/js/settings.js"></script>
<script>initLayout('../');</script>
</body>
</html>
